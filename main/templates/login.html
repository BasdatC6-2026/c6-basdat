{% extends 'base.html' %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="flex flex-col items-center justify-center min-h-[70vh]">
    <div class="w-full max-w-md bg-white rounded-xl shadow-lg p-8 border border-gray-100">
        <h2 class="text-3xl font-extrabold text-center text-gray-800 mb-6">Welcome Back</h2>
        
        {% if messages %}
            {% for message in messages %}
                <div id="alert" class="mb-4 p-3 bg-red-50 text-red-700 border-l-4 border-red-500 rounded flex justify-between items-center">
                    <span>{{ message }}</span>
                    <button onclick="this.parentElement.remove()" class="text-red-900 font-bold">&times;</button>
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST" action="{% url 'login' %}" class="space-y-5">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-semibold text-gray-600 mb-1">Email / Username</label>
                <input type="text" name="email" required 
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none transition-all"
                    placeholder="Enter your email">
            </div>
            
            <div>
                <label class="block text-sm font-semibold text-gray-600 mb-1">Password</label>
                <input type="password" name="password" required 
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none transition-all"
                    placeholder="••••••••">
            </div>

            <button type="submit" id="loginBtn"
                class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transform hover:scale-[1.02] transition-all active:scale-95">
                Masuk
            </button>
        </form>

        <p class="text-center text-gray-500 mt-6 text-sm">
            Don't have an account? <a href="/register" class="text-blue-600 font-semibold hover:underline">Sign up</a>
        </p>
    </div>
</div>

<script>
    // chnge button text saat click
    const form = document.querySelector('form');
    const btn = document.getElementById('loginBtn');
    
    form.addEventListener('submit', () => {
        btn.innerHTML = '<span class="animate-pulse">Authenticating...</span>';
        btn.classList.add('opacity-80', 'cursor-not-allowed');
    });
</script>
{% endblock %}
